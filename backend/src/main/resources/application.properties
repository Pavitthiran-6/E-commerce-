# ==========================================
# BELLEDONNE E-COMMERCE — APPLICATION CONFIG
# ==========================================

# Server
server.port=8080
server.error.include-message=always

# ==========================================
# File-Based H2 Database (Persistent)
# ==========================================
spring.datasource.url=jdbc:h2:file:./data/belledonne_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false

# ==========================================
# PostgreSQL Database (Commented Out)
# ==========================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/belledonne_db
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.hikari.maximum-pool-size=10
# spring.datasource.hikari.minimum-idle=2
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=bGVsbGVkb25uZS1lY29tbWVyY2Utc3VwZXItc2VjcmV0LWtleS0yMDI2LXByb2R1Y3Rpb24=
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

# ==========================================
# Email (Gmail SMTP) — CHANGE THESE
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-gmail@gmail.com
spring.mail.password=your-app-password-here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=noreply@belledonne.in

# ==========================================
# Razorpay — CHANGE THESE (get from razorpay.com/dashboard)
# ==========================================
razorpay.key.id=rzp_test_CHANGE_ME
razorpay.key.secret=CHANGE_ME_SECRET

# ==========================================
# Cloudinary — CHANGE THESE (free at cloudinary.com)
# ==========================================
cloudinary.cloud-name=your-cloud-name
cloudinary.api-key=your-api-key
cloudinary.api-secret=your-api-secret

# ==========================================
# File Upload
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# CORS
# ==========================================
cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://belledonne.in

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================================
# App-specific
# ==========================================
app.name=BELLEDONNE Paris
app.free-shipping-threshold=999
app.shipping-charge=79
app.gst-rate=18
app.otp-expiry-minutes=10
app.timezone=Asia/Kolkata
