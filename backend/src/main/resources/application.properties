# ==========================================
# BELLEDONNE E-COMMERCE — APPLICATION CONFIG
# ==========================================

# Server — Render injects PORT automatically
server.port=${PORT:8080}
server.error.include-message=always

# ==========================================
# Database — REQUIRED on Render
# Set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Note: PostgreSQLDialect is auto-detected - no need to specify it
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false
# Speed up JPA boot — skip fetching DB metadata during startup
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ==========================================
# JWT — REQUIRED on Render
# Set JWT_SECRET in your environment — minimum 32 characters
# ==========================================
jwt.secret=${JWT_SECRET:a-very-long-and-secure-jwt-secret-key-for-local-dev-12345}
jwt.access-token-expiry=1800000
jwt.refresh-token-expiry=604800000

# ==========================================
# Email (Gmail SMTP) — optional, falls back to placeholder
# Set MAIL_USERNAME and MAIL_PASSWORD in Render env vars
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply@belledonne.in}
spring.mail.password=${MAIL_PASSWORD:disabled}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:noreply@belledonne.in}

# ==========================================
# Razorpay — optional, falls back to placeholder
# Set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET in Render env vars
# ==========================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}

# ==========================================
# Cloudinary — optional, falls back to placeholder
# Set CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET in Render env vars
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder-cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:000000000000000}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder-secret}

# ==========================================
# File Upload & Request Body Size
# ==========================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# Allow large JSON bodies (base64 images embedded in PUT/POST)
server.tomcat.max-http-form-post-size=20MB

# ==========================================
# CORS — set your Vercel/Netlify URL in CORS_ALLOWED_ORIGINS
# ==========================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================================
# App-specific
# ==========================================
app.name=BELLEDONNE Paris
app.free-shipping-threshold=999
app.shipping-charge=79
app.gst-rate=18
app.otp-expiry-minutes=10
app.timezone=Asia/Kolkata
