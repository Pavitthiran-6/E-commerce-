# ==========================================
# BELLEDONNE E-COMMERCE — APPLICATION CONFIG
# ==========================================

# Server — Render injects PORT automatically
server.port=${PORT:8080}
server.error.include-message=always

# ==========================================
# Database — REQUIRED on Render
# Set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
# Prevent startup deadlock by setting database lock and query timeouts
spring.datasource.hikari.connection-init-sql=SET lock_timeout = 5000; SET statement_timeout = 30000

# JPA / Hibernate
# Note: PostgreSQLDialect is auto-detected from the JDBC URL - no need to specify it explicitly
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.open-in-view=false

# ==========================================
# JWT — REQUIRED on Render
# Set JWT_SECRET in your environment — minimum 32 characters
# ==========================================
jwt.secret=${JWT_SECRET:a-very-long-and-secure-jwt-secret-key-for-local-dev-12345}
# Access token: 15 minutes (900,000 ms) — short-lived for security
jwt.access-token-expiry=900000
# Refresh token: 30 days (2,592,000,000 ms) — long-lived for e-commerce UX
# Users should remain logged in for 30 days without visiting.
# If you change this, also update the cookie maxAge in AuthController and
# the default TTL in TokenBlacklistService.
jwt.refresh-token-expiry=2592000000

# ==========================================
# Redis — Optional (used for token blacklist)
# Set REDIS_URL in production (Render Redis add-on).
# If REDIS_URL is not set, in-memory fallback is used.
# ==========================================
spring.data.redis.url=${REDIS_URL:}
# Disable Redis auto-connect failure on startup if REDIS_URL is empty
spring.data.redis.repositories.enabled=false


# ==========================================
# Email (Brevo SMTP) — optional, falls back to placeholder
# Set MAIL_USERNAME and MAIL_PASSWORD in Render env vars
# Port 2525 is used because Render blocks standard ports 25, 465, and 587.
# ==========================================
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:pavitthiran6@gmail.com}

# ==========================================
# Razorpay — optional, falls back to placeholder
# Set RAZORPAY_KEY_ID and RAZORPAY_KEY_SECRET in Render env vars
# ==========================================
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
# Webhook secret — set RAZORPAY_WEBHOOK_SECRET in Render env vars.
# Find it in Razorpay Dashboard → Webhooks → your webhook → Secret.
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:placeholder_webhook_secret}

# ==========================================
# Cloudinary — optional, falls back to placeholder
# Set CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET in Render env vars
# ==========================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder-cloud}
cloudinary.api-key=${CLOUDINARY_API_KEY:000000000000000}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder-secret}

# ==========================================
# File Upload & Request Body Size
# ==========================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
# Allow large JSON bodies (base64 images embedded in PUT/POST)
server.tomcat.max-http-form-post-size=20MB

# ==========================================
# CORS — set your Vercel/Netlify URL in CORS_ALLOWED_ORIGINS
# ==========================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================================
# App-specific
# ==========================================
app.name=BELLEDONNE Paris
app.free-shipping-threshold=999
app.shipping-charge=79
app.gst-rate=18
app.otp-expiry-minutes=10
app.timezone=Asia/Kolkata

# ==========================================
# SECURITY — REQUIRED IN PRODUCTION
# ==========================================

# Admin bootstrap password (used by AdminSeeder on first startup only).
# MUST be set in production. If not set, no default admin account will be created.
# Set via environment variable: ADMIN_DEFAULT_PASSWORD=<strong-password>
# ADMIN_DEFAULT_PASSWORD is intentionally NOT set here — it must come from the environment.

# Refresh token cookie security.
# Set COOKIE_SECURE=false ONLY for local HTTP development (non-HTTPS).
# In production (HTTPS), this MUST be true (the default).
# COOKIE_SECURE=true

# ==========================================
# Google Auth
# ==========================================
google.client.id=${GOOGLE_CLIENT_ID:692370832248-4k20n2rn4gt39bjj0gcq81g36h9gnk0p.apps.googleusercontent.com}

# ==========================================
# Shiprocket Credentials
# ==========================================
shiprocket.email=${SHIPROCKET_EMAIL}
shiprocket.password=${SHIPROCKET_PASSWORD}
